controller_manager:
  ros__parameters:
    update_rate: 100 # Hz
    
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

arm_controller:
  ros__parameters:
    joints:
      - ec66joint1
      - ec66joint2
      - ec66joint3
      - ec66joint4
      - ec66joint5
      - ec66joint6
    command_interfaces:
      - position
      - velocity
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.2
      goal_time: 1.0
      ec66joint1: { trajectory: 0.2, goal: 0.1 }
      ec66joint2: { trajectory: 0.2, goal: 0.1 }
      ec66joint3: { trajectory: 0.2, goal: 0.1 }
      ec66joint4: { trajectory: 0.2, goal: 0.1 }
      ec66joint5: { trajectory: 0.2, goal: 0.1 }
      ec66joint6: { trajectory: 0.2, goal: 0.1 }
